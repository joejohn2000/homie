services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homie_db}
      POSTGRES_USER: ${POSTGRES_USER:-homie_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homie_pass_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homie_user} -d ${POSTGRES_DB:-homie_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_POSTGRES: "True"
      RUNNING_IN_DOCKER: "True"
      LOAD_SAMPLE_DATA: ${LOAD_SAMPLE_DATA:-True}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
